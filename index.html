<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0c0c1a"/>
<title>CK Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── RESET + TOKENS ───────────────────────── */
:root{
  --p:#e91e8c;--t:#00c896;--pu:#7c3aed;--g:#f59e0b;--r:#ef4444;
  --bg:#0c0c1a;--sb:#10101f;--card:#151524;--c2:#1b1b2e;--c3:#1f1f35;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.04);
  --tx:#e2e0f5;--t2:#9896b8;--t3:#5e5c78;
  --rad:10px;--rad2:14px;
  --sb-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(233,30,140,.25);border-radius:2px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sb{
  width:var(--sb-w);min-width:var(--sb-w);background:var(--sb);
  border-right:1px solid var(--b1);display:flex;flex-direction:column;
  z-index:200;transition:transform .25s ease;overflow-y:auto;overflow-x:hidden;flex-shrink:0
}
#sb.hidden{transform:translateX(-100%);position:fixed;top:0;bottom:0;left:0}
/* Mobile overlay */
.sb-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
.sb-mask.show{display:block}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}

/* ── SIDEBAR INNER ── */
.sb-hd{display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 14px;border-bottom:1px solid var(--b1)}
.sb-logo{display:flex;align-items:center;gap:9px}
.sb-mark{width:30px;height:30px;min-width:30px;background:linear-gradient(135deg,var(--p),var(--pu));
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#fff}
.sb-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.8px}
.sb-x{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:16px;line-height:1}
.sb-nav{flex:1;padding:10px 10px;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  cursor:pointer;color:var(--t3);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .15s;white-space:nowrap;position:relative}
.ni:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.ni.on{background:rgba(233,30,140,.1);color:var(--tx);font-weight:600;
  border-left:2px solid var(--p);border-radius:0 8px 8px 0;padding-left:11px}
.ni svg{width:17px;height:17px;min-width:17px;flex-shrink:0;stroke-width:1.8}
.nb{background:var(--p);color:#fff;border-radius:10px;padding:1px 6px;
  font-size:10px;font-weight:700;margin-left:auto}
.sb-ft{padding:12px 10px;border-top:1px solid var(--b1);margin-top:auto}
.bk-btn{width:100%;padding:10px 14px;background:rgba(233,30,140,.08);border:1px solid rgba(233,30,140,.2);
  border-radius:9px;color:var(--t2);cursor:pointer;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:8px}
.bk-btn:hover{background:rgba(233,30,140,.15);color:var(--tx);border-color:rgba(233,30,140,.4)}

/* ── TOPBAR ── */
#tb{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;min-height:52px;background:var(--sb);
  border-bottom:1px solid var(--b1);gap:10px;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.ham{background:none;border:none;color:var(--t2);cursor:pointer;padding:5px;
  border-radius:6px;transition:color .15s;display:flex;align-items:center}
.ham:hover{color:var(--tx)}
.tb-title{font-size:14px;font-weight:600;white-space:nowrap}
.tb-r{display:flex;align-items:center;gap:8px}
.srch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);
  border:1px solid var(--b1);border-radius:8px;padding:6px 11px;
  width:180px;transition:border-color .15s}
.srch:focus-within{border-color:rgba(233,30,140,.35)}
.srch input{background:none;border:none;color:var(--tx);font-size:13px;outline:none;
  font-family:'Inter',sans-serif;width:100%}
.srch input::placeholder{color:var(--t3)}
@media(max-width:600px){.srch{display:none}}
.conn-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);
  padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--b2)}
.cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cd.ok{background:var(--t)} .cd.fail{background:var(--r)}
.cd.spin{background:var(--g);animation:cdbl .9s infinite}
@keyframes cdbl{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:20px}
@media(max-width:600px){#content{padding:14px}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;
  font-family:'Inter',sans-serif;white-space:nowrap}
.btn:disabled{opacity:.5;pointer-events:none}
.bp{background:linear-gradient(135deg,var(--p),#8b0d5a);color:#fff}
.bp:hover{filter:brightness(1.1);transform:translateY(-1px)}
.bt{background:linear-gradient(135deg,var(--t),#009e78);color:#fff}
.bt:hover{filter:brightness(1.1)}
.bg{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--b1)}
.bg:hover{background:rgba(255,255,255,.09);color:var(--tx)}
.bd{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.bsm{padding:5px 11px;font-size:12px}
.bfull{width:100%;justify-content:center;padding:13px;font-size:14px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--rad2);padding:18px;position:relative}
.c-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.c-ttl{font-size:13.5px;font-weight:600}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:2fr 1.1fr .9fr;gap:12px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:650px){.g2,.g3{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}}

/* ── STAT CARD ── */
.sc{background:var(--card);border:1px solid var(--b1);border-radius:var(--rad2);padding:14px}
.sc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.ip{background:rgba(233,30,140,.12)} .it{background:rgba(0,200,150,.12)}
.ipu{background:rgba(124,58,237,.12)} .ig{background:rgba(245,158,11,.12)}
.sc-v{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.sc-l{font-size:11.5px;color:var(--t3);margin-top:3px}
.sc-tr{font-size:11px;font-weight:600;margin-top:4px}
.up{color:var(--t)} .dn{color:var(--r)}

/* ── BIG STAT ── */
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:650px){.bg2{grid-template-columns:1fr}}
.bs{border-radius:var(--rad2);padding:20px 22px;border:1px solid transparent}
.bsp{background:linear-gradient(135deg,rgba(0,200,150,.1),rgba(0,100,80,.05));border-color:rgba(0,200,150,.2)}
.bso{background:linear-gradient(135deg,rgba(233,30,140,.1),rgba(120,0,60,.05));border-color:rgba(233,30,140,.2)}
.bk{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px}
.bkt{color:var(--t)} .bkp{color:var(--p)}
.bn{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1}
.bs-sub{font-size:12px;color:var(--t3);margin-top:6px}
.prog{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:12px}
.pf{height:100%;background:linear-gradient(90deg,var(--t),var(--p));border-radius:2px;transition:width .6s}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--b1)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--b2);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover td{background:rgba(255,255,255,.018)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tin{color:var(--t);font-weight:600} .tout{color:var(--r);font-weight:600}
.ain{color:var(--t);font-weight:700} .aout{color:#f87171;font-weight:700}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pp{background:rgba(0,200,150,.1);color:var(--t);border:1px solid rgba(0,200,150,.2)}
.ppe{background:rgba(245,158,11,.1);color:var(--g);border:1px solid rgba(245,158,11,.2)}
.po{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.pb{background:rgba(0,200,150,.08);color:var(--t);border:1px solid rgba(0,200,150,.15)}
.pc2{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}

/* ── EVENT BADGES ── */
.eb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.ew{background:rgba(233,30,140,.12);color:var(--p)}
.ec{background:rgba(124,58,237,.12);color:#a78bfa}
.eb_{background:rgba(245,158,11,.12);color:var(--g)}
.eg{background:rgba(249,115,22,.12);color:#fb923c}
.ex{background:rgba(255,255,255,.07);color:var(--t3)}

/* ── SERVICE CHIPS ── */
/* Default unselected */
.svc{padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--b1);background:rgba(255,255,255,.04);
  color:var(--t2);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.svc:hover{transform:translateY(-1px);border-color:rgba(233,30,140,.3);color:var(--tx)}
/* Selected - each chip gets unique color via data-name CSS */
.svc.on{font-weight:600}
.svc.on[data-n="LED Walls"]      {color:#f472b6;border-color:#f472b6;background:rgba(244,114,182,.12)}
.svc.on[data-n="Sparklers"]      {color:#fb923c;border-color:#fb923c;background:rgba(251,146,60,.12)}
.svc.on[data-n="DJ Service"]     {color:#a78bfa;border-color:#a78bfa;background:rgba(167,139,250,.12)}
.svc.on[data-n="Photo Booth"]    {color:#f9a8d4;border-color:#f9a8d4;background:rgba(249,168,212,.12)}
.svc.on[data-n="Dance Floor"]    {color:#818cf8;border-color:#818cf8;background:rgba(129,140,248,.12)}
.svc.on[data-n="Uplights"]       {color:#c084fc;border-color:#c084fc;background:rgba(192,132,252,.12)}
.svc.on[data-n="MC Service"]     {color:#67e8f9;border-color:#67e8f9;background:rgba(103,232,249,.12)}
.svc.on[data-n="Truss"]          {color:#6ee7b7;border-color:#6ee7b7;background:rgba(110,231,183,.12)}
.svc.on[data-n="Fog Machine"]    {color:#2dd4bf;border-color:#2dd4bf;background:rgba(45,212,191,.12)}
.svc.on[data-n="Cold Spark"]     {color:#fdba74;border-color:#fdba74;background:rgba(253,186,116,.12)}
.svc.on[data-n="Custom Lighting"]{color:#34d399;border-color:#34d399;background:rgba(52,211,153,.12)}
.svc.on[data-n="Sound System"]   {color:#fbbf24;border-color:#fbbf24;background:rgba(251,191,36,.12)}
/* Custom saved chips */
.svc.on[data-custom="1"]         {color:#a5f3fc;border-color:#a5f3fc;background:rgba(165,243,252,.12)}
.svc-wrap{display:flex;flex-wrap:wrap;gap:7px}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.fi{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:8px;
  padding:10px 12px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .18s,box-shadow .18s;width:100%}
.fi:focus{border-color:rgba(233,30,140,.4);box-shadow:0 0 0 3px rgba(233,30,140,.06)}
.fi::placeholder{color:var(--t3)}
select.fi{cursor:pointer} select.fi option{background:var(--c2)}
textarea.fi{resize:vertical;min-height:68px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:span 2}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}.full{grid-column:span 1}}

/* ── TOGGLE ── */
.tog{width:40px;height:22px;background:rgba(255,255,255,.12);border-radius:11px;
  position:relative;cursor:pointer;border:none;transition:background .25s;flex-shrink:0}
.tog.on{background:linear-gradient(135deg,var(--t),#009e78)}
.tog::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tog.on::after{left:21px}

/* ── SCHEDULE / EVENT ROW ── */
.ev-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:10px;
  background:var(--card);border:1px solid var(--b2);margin-bottom:7px;
  cursor:pointer;transition:all .15s}
.ev-row:hover{background:var(--c2);border-color:rgba(233,30,140,.2)}
.ev-dt{min-width:42px;height:42px;border-radius:8px;background:rgba(0,200,150,.1);
  border:1px solid rgba(0,200,150,.18);display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0}
.ev-mo{font-size:8.5px;color:var(--t);text-transform:uppercase;font-weight:700}
.ev-dy{font-size:18px;font-weight:700;color:#fff;line-height:1;font-family:'Rajdhani',sans-serif}

/* ── PEOPLE GRID ── */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.pc{background:var(--card);border:1px solid var(--b1);border-radius:var(--rad2);
  padding:16px;text-align:center;cursor:pointer;transition:all .18s}
.pc:hover{transform:translateY(-2px);border-color:rgba(233,30,140,.3)}
.pc-av{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--c2);border:1.5px solid var(--b1)}
.rbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  display:inline-block;padding:2px 8px;border-radius:20px;margin-bottom:6px}
.rc{background:rgba(0,200,150,.1);color:var(--t)}
.rv{background:rgba(245,158,11,.1);color:var(--g)}
.rd{background:rgba(167,139,250,.1);color:#a78bfa}
.rs{background:rgba(233,30,140,.1);color:var(--p)}
.pc-name{font-weight:600;font-size:13px;margin-bottom:2px}
.pc-sub{font-size:11.5px;color:var(--t3)}
.pc-acts{display:flex;justify-content:center;gap:6px;margin-top:9px}
.icb{width:27px;height:27px;border-radius:6px;border:1px solid var(--b1);
  background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t3);text-decoration:none;transition:all .15s}
.icb:hover{border-color:rgba(233,30,140,.3);color:var(--p)}

/* ── INVENTORY ── */
.inv-i{display:flex;align-items:center;gap:10px;padding:11px;border-radius:9px;
  background:rgba(255,255,255,.025);border:1px solid var(--b2);margin-bottom:7px;
  cursor:pointer;transition:all .15s}
.inv-i:hover{background:rgba(255,255,255,.04);border-color:rgba(0,200,150,.15)}
.inv-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--c2);flex-shrink:0}

/* ── CAL ── */
.cal-hd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cal-hd span{text-align:center;font-size:9px;font-weight:600;color:var(--t3);padding:2px}
.cal-gd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-c{min-height:36px;border-radius:5px;padding:3px;background:rgba(255,255,255,.02);
  border:1px solid var(--b2);font-size:9.5px}
.cal-c.td{border-color:rgba(233,30,140,.3);background:rgba(233,30,140,.04)}
.cal-c.td .cdn{color:var(--p);font-weight:700}
.cdn{color:var(--t3);margin-bottom:1px}
.cev{font-size:8px;padding:1px 3px;border-radius:2px;margin-bottom:1px;
  background:rgba(0,200,150,.15);color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── TRIP ── */
.trip{display:flex;align-items:center;gap:11px;padding:11px;border-radius:9px;
  background:rgba(255,255,255,.025);border:1px solid var(--b2);margin-bottom:7px}
.trip-dt{min-width:40px;height:40px;border-radius:8px;background:rgba(124,58,237,.1);
  border:1px solid rgba(124,58,237,.18);display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0}
.trip-mo{font-size:8.5px;color:#a78bfa;text-transform:uppercase;font-weight:700}
.trip-dy{font-size:17px;font-weight:700;color:#fff;line-height:1;font-family:'Rajdhani',sans-serif}
.mi-tag{margin-left:auto;font-size:17px;font-weight:700;color:var(--g);font-family:'Rajdhani',sans-serif}

/* ── TABS ── */
.tab-bar{display:flex;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--b1);
  border-radius:10px;padding:3px;width:fit-content;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;
  color:var(--t3);transition:all .15s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--p),#8b0d5a);color:#fff;font-weight:600}
.tab:hover:not(.on){background:rgba(255,255,255,.05);color:var(--tx)}

/* ── QA ── */
.qa{width:100%;padding:10px 13px;border-radius:9px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;margin-bottom:7px;
  display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif}
.qa:hover{filter:brightness(1.08);transform:translateY(-1px)}
.qat{background:linear-gradient(135deg,var(--t),#009e78);color:#fff}
.qag{background:linear-gradient(135deg,var(--g),#c07900);color:#fff}
.qapu{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff}

/* ── MODAL ── */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);
  animation:fa .18s;padding:12px}
.mo{background:var(--c2);border:1px solid rgba(255,255,255,.1);border-radius:var(--rad2);
  padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:ma .2s;position:relative}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mo-ttl{font-size:17px;font-weight:700}
.mx{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:2px 5px}
.mx:hover{color:var(--tx)}
@keyframes fa{from{opacity:0}to{opacity:1}}
@keyframes ma{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:scale(1);opacity:1}}

/* ── TOAST ── */
#toasts{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:290px}
.toast{padding:10px 14px;border-radius:9px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;animation:tsi .22s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.tok{background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.3);color:var(--t)}
.ter{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171}
.tin2{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#a78bfa}
@keyframes tsi{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── MISC ── */
.div{height:1px;background:var(--b1);margin:11px 0}
.su{animation:su .28s ease both}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.lc{display:flex;align-items:center;justify-content:center;height:160px;gap:10px;color:var(--t3);font-size:13px}
.spin{width:18px;height:18px;border:2px solid rgba(233,30,140,.2);border-top-color:var(--p);
  border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:13px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.pg-ttl{font-size:20px;font-weight:700;letter-spacing:-.2px}
.sr{display:flex;align-items:center;gap:7px}
.show-r{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--t2)}
/* Stale badge */
.stale{font-size:10px;color:var(--t3);padding:2px 6px;background:rgba(255,255,255,.04);
  border-radius:4px;margin-left:8px;border:1px solid var(--b2)}
/* Cancelled event row */
.ev-row.cancelled{opacity:.45;border-left:3px solid var(--r) !important;border-left-width:3px}
.ev-row.cancelled .sc-v,.ev-row.cancelled [style*="fbbf24"]{color:var(--t3) !important}
.cancelled-stripe{
  background:repeating-linear-gradient(-45deg,transparent,transparent 5px,rgba(239,68,68,.03) 5px,rgba(239,68,68,.03) 10px);
}
/* Cancelled badge in pill */
.p-cancel{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.25);
  text-decoration:none}
.canc-banner{display:flex;align-items:center;gap:9px;padding:10px 13px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;
  font-size:12.5px;color:#f87171;margin-bottom:14px;font-weight:500}
</style>

<body>

<script>
/* ═══════════════════════════════════════════════════════════════
   CK EVENTS v4  — Fast Cache + Full Google Sheets Integration
   Pattern: Show cached data INSTANTLY, refresh silently in bg
═══════════════════════════════════════════════════════════════ */

// ── CONFIG ─────────────────────────────────────────────────────
// ── CONFIG ──
let SCRIPT_URL = localStorage.getItem('ck_url') || '';
const CACHE_TTL = 15 * 60 * 1000;

async function loadConfig() {
  // If user already saved a custom URL in Settings, use that
  if (localStorage.getItem('ck_url')) return;
  try {
    const res = await fetch('./config.json?_=' + Date.now());
    const cfg = await res.json();
    if (cfg.scriptUrl) {
      SCRIPT_URL = cfg.scriptUrl;
    }
  } catch(e) {
    console.warn('config.json not found, using Settings URL');
  }
}
// ── STATE ───────────────────────────────────────────────────────
const S = {
  view: 'dashboard',
  showVals: true,
  connected: null,
  year: new Date().getFullYear().toString(),
  // Cached data
  report: null, contacts: [], equipment: [], mileageData: null,
  calEvents: [], customSvcs: [], // saved custom service packages
};

/* ═══ ULTRA-FAST CACHE ═══════════════════════════════════════ */
// Two-layer: memory (instant) + localStorage (persists across sessions)
const MC = {}; // memory cache

function cGet(k) {
  if (MC[k] && Date.now() - MC[k].t < CACHE_TTL) return MC[k].d;
  try {
    const s = localStorage.getItem('ck4_' + k);
    if (s) { const o = JSON.parse(s); if (Date.now() - o.t < CACHE_TTL) { MC[k] = o; return o.d; } }
  } catch(e) {}
  return null;
}

function cSet(k, d) {
  const o = { d, t: Date.now() };
  MC[k] = o;
  try { localStorage.setItem('ck4_' + k, JSON.stringify(o)); } catch(e) {}
}

function cDel(k) {
  delete MC[k];
  try { localStorage.removeItem('ck4_' + k); } catch(e) {}
}

function cDump(pattern) { // clear matching keys
  Object.keys(localStorage).filter(k => k.startsWith('ck4_') && (!pattern || k.includes(pattern))).forEach(k => {
    localStorage.removeItem(k); delete MC[k.replace('ck4_', '')];
  });
}

/* ═══ API ════════════════════════════════════════════════════ */
// Checks cache first, only fetches if stale
async function api(action, ...args) {
  const cacheKey = action + JSON.stringify(args);
  const cached = cGet(cacheKey);
  if (cached !== null) return cached;
  return apiForce(action, ...args);
}

// Always fetches fresh (for mutations + bg refresh)
async function apiForce(action, ...args) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set('action', action);
  if (args.length) url.searchParams.set('args', encodeURIComponent(JSON.stringify(args)));
  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), 28000);
  try {
const res = await fetch(url.toString(), {
  signal: ctrl.signal,
  credentials: 'omit',   // ← fixes Chrome CORS redirect issue
  mode: 'cors',
});    clearTimeout(to);
    const json = await res.json();
    if (json.ok === false) throw new Error(json.error || 'Backend error');
    const cacheKey = action + JSON.stringify(args);
    cSet(cacheKey, json.data);
    return json.data;
  } catch(e) {
    clearTimeout(to);
    if (e.name === 'AbortError') throw new Error('Timeout — Google Sheets is slow right now');
    throw e;
  }
}

// Background refresh: get cached data immediately, then silently update
async function apiBg(action, ...args) {
  const cacheKey = action + JSON.stringify(args);
  const cached = cGet(cacheKey);
  // Fire fetch in background (no await)
  apiForce(action, ...args).then(fresh => {
    cSet(cacheKey, fresh);
    // Update S state quietly
    if (action === 'getReportData') S.report = fresh;
    if (action === 'getContacts') S.contacts = fresh;
    if (action === 'getEquipmentList') S.equipment = fresh;
    if (action === 'getMileageList') S.mileageData = fresh;
    if (action === 'getUpcomingCalendarEvents') S.calEvents = fresh;
    if (action === 'getCustomEquipmentList') S.customSvcs = fresh || [];
  }).catch(() => {});
  return cached;
}

/* ═══ CONN TEST ══════════════════════════════════════════════ */
async function testConn(silent = false) {
  const cd = document.getElementById('cd');
  const cl = document.getElementById('clbl');
  cd.className = 'cd spin';
  try {
    const d = await apiForce('ping');
    S.connected = true;
    cd.className = 'cd ok';
    if (cl) { cl.style.display='none'; }
    if (!silent) toast(`✅ Connected · Sheet: "${d.sheet}"`, 'ok', 3500);
    return true;
  } catch(e) {
    S.connected = false;
    cd.className = 'cd fail';
    if (!silent) toast('Connection failed — check Settings', 'er', 5000);
    return false;
  }
}

/* ═══ TOAST ══════════════════════════════════════════════════ */
function toast(msg, type='in', dur=3200) {
  const el = document.createElement('div');
  el.className = `toast t${type}`;
  el.innerHTML = `<span>${type==='ok'?'✓':type==='er'?'✕':'ℹ'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => {
    el.style.transition='all .22s';el.style.opacity='0';el.style.transform='translateX(50px)';
    setTimeout(()=>el.remove(),230);
  }, dur);
}

/* ═══ SIDEBAR ════════════════════════════════════════════════ */
function openSb() {
  document.getElementById('sb').classList.remove('hidden');
  document.getElementById('sbmask').classList.add('show');
}
function closeSb() {
  document.getElementById('sb').classList.add('hidden');
  document.getElementById('sbmask').classList.remove('show');
}

/* ═══ NAV ════════════════════════════════════════════════════ */
const TITLES = { dashboard:'Dashboard', events:'Events', 'new-event':'New Event',
  financials:'Financial Ledger', people:'People', inventory:'Inventory',
  mileage:'Mileage', settings:'Settings' };

function go(v) {
  S.view = v; closeSb();
  document.querySelectorAll('.ni').forEach(el => el.classList.toggle('on', el.dataset.v === v));
  document.getElementById('tb-ttl').textContent = TITLES[v] || v;
  window.location.hash = v;
  render(v);
}
document.querySelectorAll('.ni').forEach(el => el.addEventListener('click', e => { e.preventDefault(); go(el.dataset.v); }));

/* ═══ RENDER ROUTER ══════════════════════════════════════════ */
function render(v) {
  const c = document.getElementById('content');
  // Show spinner only if no cache available (first ever load)
  const hasSomeCache = S.report || S.contacts.length || S.equipment.length;
  if (!hasSomeCache && v !== 'new-event' && v !== 'settings') {
    c.innerHTML = `<div class="lc"><div class="spin"></div><span>Loading…</span></div>`;
  }
  const fn = { dashboard:rDash, events:rEvs, 'new-event':rNewEv,
    financials:rFin, people:rPpl, inventory:rInv, mileage:rMile, settings:rSet }[v];
  if (fn) fn();
}

/* ═══ HELPERS ════════════════════════════════════════════════ */
function fv(n) { if (!S.showVals) return '●●●'; return '$' + (parseFloat(n)||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fv2(n) { if (!S.showVals) return '●●●●●'; return '$' + (parseFloat(n)||0).toFixed(2); }

function pill(s) {
  const m = { Paid:`<span class="pill pp">✓ Paid</span>`, Pending:`<span class="pill ppe">⏱ Pending</span>`,
    Overdue:`<span class="pill po">! Overdue</span>`, Booked:`<span class="pill pb">Booked</span>`,
    Completed:`<span class="pill pp">Completed</span>`,
    Cancelled:`<span class="pill p-cancel">✕ Cancelled</span>` };
  return m[s] || `<span class="pill">${s}</span>`;
}

// Active = not cancelled. Used everywhere for stats.
function activeEvs(evPL) { return (evPL||[]).filter(e=>e.status!=='Cancelled'); }
function cancelledEvs(evPL) { return (evPL||[]).filter(e=>e.status==='Cancelled'); }

// Recompute active-only totals from eventPL so cancelled events never inflate numbers
function activeTotals(evPL) {
  const evs = activeEvs(evPL);
  return {
    income:      evs.reduce((a,e)=>a+(e.income||0),0),
    expenses:    evs.reduce((a,e)=>a+(e.expenses||0),0),
    profit:      evs.reduce((a,e)=>a+(e.profit||0),0),
    outstanding: evs.filter(e=>(e.balance||0)>0).reduce((a,e)=>a+(e.balance||0),0),
    count:       evs.length,
  };
}

function ebadge(t) {
  const m = { 'Wedding':'ew','Sangeet':'ec','Birthday / Sweet 16':'eb_','Baby Shower':'eg',
    'Garba / Navratri':'eg','Corporate / Party':'ec','Equipment Rental':'ex' };
  return `<span class="eb ${m[t]||'ex'}">${t||'Event'}</span>`;
}

function fdate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch { return d; }
}

function evDT(d) {
  if (!d) return {mo:'',dy:'?'};
  const dt = new Date(d);
  return { mo: dt.toLocaleString('en',{month:'short'}), dy: dt.getDate() };
}

/* ═══ DASHBOARD ══════════════════════════════════════════════ */
async function rDash() {
  const c = document.getElementById('content');

  // Show from cache immediately if available
  if (!S.report) {
    const cached = cGet('getReportData["' + S.year + '"]');
    if (cached) S.report = cached;
  }
  if (!S.calEvents.length) {
    const cc = cGet('getUpcomingCalendarEvents[]');
    if (cc) S.calEvents = cc;
  }

  if (S.report) {
    renderDashHTML();
    // Silently refresh in background
    apiBg('getReportData', S.year).then(d => { if(d){ S.report=d; renderDashHTML(); }});
    apiBg('getUpcomingCalendarEvents').then(d => { if(d){ S.calEvents=d; }});
  } else {
    c.innerHTML = `<div class="lc"><div class="spin"></div><span>Loading from Google Sheets…</span></div>`;
    try {
      [S.report, S.calEvents] = await Promise.all([
        apiForce('getReportData', S.year),
        apiForce('getUpcomingCalendarEvents').catch(() => [])
      ]);
      renderDashHTML();
    } catch(e) {
      S.report = { income:0, expenses:0, profit:0, monthly:[], eventPL:[], outstanding:[], totalMiles:0, mileageDeduction:0, mileageRate:0.70 };
      renderDashHTML();
      toast('Could not connect — showing empty dashboard', 'er', 5000);
    }
  }
  // Badge shows ACTIVE events only (not cancelled)
  document.getElementById('ev-nb').textContent = activeEvs(S.report?.eventPL).length || 0;
}

function renderDashHTML() {
  const r = S.report || {};
  const upcoming = (S.calEvents || []).slice(0, 5);
  // Cancelled events excluded from ALL stat calculations
  const aT = activeTotals(r.eventPL);
  const cancelCount = cancelledEvs(r.eventPL).length;
  const outstanding = activeEvs(r.outstanding||[]).slice(0, 6); // backend already excludes cancelled
  document.getElementById('content').innerHTML = `<div class="su">
    <div class="sec-hd">
      <div class="sr"><span class="pg-ttl">Dashboard</span>
        <span class="stale" title="Year">${S.year} <button onclick="changeYear()" style="background:none;border:none;color:var(--p);font-size:11px;cursor:pointer">▼</button></span>
      </div>
      <div class="sr">
        <span class="show-r">Values <button class="tog ${S.showVals?'on':''}" id="val-tog" onclick="toggleVals()"></button></span>
        <button class="btn bp bsm" onclick="closeSb();go('new-event')">+ New Event</button>
      </div>
    </div>
    <div class="sgrid">
      <div class="sc"><div class="sc-icon ig">💰</div><div class="sc-v">${fv(aT.income)}</div><div class="sc-l">Revenue ${S.year}</div><div class="sc-tr up">↑ Active events only</div></div>
      <div class="sc"><div class="sc-icon it">📈</div><div class="sc-v">${fv(aT.profit)}</div><div class="sc-l">Net Profit</div><div class="sc-tr ${aT.profit>=0?'up':'dn'}">${aT.profit>=0?'↑ Growing':'▼ Review'}</div></div>
      <div class="sc"><div class="sc-icon ip">📅</div><div class="sc-v">${aT.count}</div><div class="sc-l">Active Events ${S.year}</div><div class="sc-tr ${cancelCount>0?'dn':'up'}">${cancelCount>0?`${cancelCount} cancelled (excluded)`:'All active'}</div></div>
      <div class="sc"><div class="sc-icon ipu">⚠️</div><div class="sc-v">${fv(aT.outstanding)}</div><div class="sc-l">Outstanding</div><div class="sc-tr ${aT.outstanding>0?'dn':'up'}">${aT.outstanding>0?'Needs collection':'✓ All paid'}</div></div>
      <div class="sc"><div class="sc-icon ig">🛣️</div><div class="sc-v">${(r.totalMiles||0).toLocaleString()}</div><div class="sc-l">Miles ${S.year}</div><div class="sc-tr up">≈ ${fv(r.mileageDeduction||0)}</div></div>
    </div>
    <div class="g3">
      <div class="card">
        <div class="c-hd"><span class="c-ttl">Monthly Revenue</span><button class="btn bg bsm" onclick="closeSb();go('financials')">Full Report →</button></div>
        <div style="position:relative;height:180px"><canvas id="rev-ch"></canvas></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--b1)">
          <div><div style="font-size:10.5px;color:var(--t3);margin-bottom:2px">Revenue</div><div style="font-size:15px;font-weight:700;color:#fbbf24">${fv(aT.income)}</div></div>
          <div style="border-left:1px solid var(--b1);border-right:1px solid var(--b1);padding:0 8px"><div style="font-size:10.5px;color:var(--t3);margin-bottom:2px">Profit</div><div style="font-size:15px;font-weight:700;color:var(--t)">${fv(aT.profit)}</div></div>

function buildChart() {
  const ctx = document.getElementById('rev-ch'); if (!ctx) return;
  if (window._ch) { try { window._ch.destroy(); } catch(e){} window._ch=null; }

  const monthly = S.report?.monthly || Array(12).fill({income:0,expenses:0,profit:0});
  window._ch = new Chart(ctx, {
    type: 'bar',
    data: { labels: mo,
      datasets: [
        { label:'Income', data: monthly.map(m=>m.income||0), backgroundColor:'rgba(251,191,36,.65)', borderRadius:3, borderSkipped:false },
        { label:'Profit', data: monthly.map(m=>m.profit||0), backgroundColor:'rgba(0,200,150,.45)', borderRadius:3, borderSkipped:false }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, animation:{ duration:400 },
      plugins:{ legend:{display:false} },
      scales: {
        x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#5e5c78',font:{size:9}} },
        y:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#5e5c78',font:{size:9},callback:v=>'$'+v.toLocaleString()} }
      }
    }
  });
}

/* ═══ EVENTS ═════════════════════════════════════════════════ */
async function rEvs() {
  const c = document.getElementById('content');
  // Try cache first — show instantly
  if (!S.report) {
    const cached = cGet('getReportData["' + S.year + '"]');
    S.report = cached || null;
  }

  if (S.report) {
    renderEvsHTML(S.report.eventPL || []);
    apiBg('getReportData', S.year).then(d => { if(d){ S.report=d; renderEvsHTML(d.eventPL||[]); }});
  } else {
    c.innerHTML = `<div class="lc"><div class="spin"></div><span>Loading events…</span></div>`;
    try {
      S.report = await apiForce('getReportData', S.year);
      renderEvsHTML(S.report.eventPL || []);
    } catch(e) {
      c.innerHTML = `<div class="lc"><span style="color:var(--r)">Error: ${e.message}</span></div>`;
    }
  }
}

function renderEvsHTML(evs) {
  document.getElementById('ev-nb').textContent = activeEvs(evs).length;
  const now = new Date();
  const future = activeEvs(evs).filter(e => new Date(e.date) >= now);
  const cancelCount = cancelledEvs(evs).length;
  document.getElementById('content').innerHTML = `<div class="su">
    <div class="sec-hd">
      <span class="pg-ttl">Events (${activeEvs(evs).length} active${cancelCount>0?` · <span style="color:var(--r);font-size:14px">${cancelCount} cancelled</span>`:''})</span>
      <div class="sr">
        <div class="srch" style="width:190px">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--t3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
          <input placeholder="Search…" oninput="filterEvs(this.value,this.dataset.tab||'all')" id="ev-search" data-tab="all"/>
        </div>
        <button class="btn bp bsm" onclick="go('new-event')">+ New</button>
        <button class="btn bg bsm" onclick="S.report=null;cDel('getReportData[\\"'+S.year+'\\"]');go('events')" title="Refresh">↻</button>
      </div>
    </div>
    <div class="tab-bar" id="ev-tabs">
      <div class="tab on" onclick="switchEvTab('active',this)">Active (${activeEvs(evs).length})</div>
      <div class="tab" onclick="switchEvTab('upcoming',this)">Upcoming (${future.length})</div>
      <div class="tab" onclick="switchEvTab('balance',this)">Has Balance</div>
      <div class="tab" onclick="switchEvTab('done',this)">Completed</div>
      <div class="tab" onclick="switchEvTab('cancelled',this)" style="color:var(--r)">Cancelled (${cancelCount})</div>
    </div>
    <div id="ev-list">${evRows(activeEvs(evs))}</div>
  </div>`;
}

function evRows(evs) {
  if (!evs.length) return `<div class="empty">No events found</div>`;
  return evs.map(e => {
    const {mo,dy} = evDT(e.date);
    const isCancelled = e.status === 'Cancelled';
    return `<div class="ev-row ${isCancelled?'cancelled cancelled-stripe':''}" onclick="openEvDetail('${e.id}')">
      <div class="ev-dt" style="${isCancelled?'opacity:.5':''}"><span class="ev-mo">${mo}</span><span class="ev-dy">${dy}</span></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
          ${ebadge(e.type)}
          ${isCancelled
            ? `<span class="pill p-cancel">✕ Cancelled</span>`
            : (e.balance||0)>0
              ? `<span class="pill ppe">Bal: ${fv(e.balance)}</span>`
              : `<span class="pill pp">Paid</span>`
          }
        </div>
        <div style="font-weight:600;font-size:13px;${isCancelled?'text-decoration:line-through;color:var(--t3)':''}">${e.customer}</div>
        <div style="font-size:11.5px;color:var(--t3)">📍 ${e.venue} · ${e.date}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;${isCancelled?'opacity:.4':''}">
        <div style="font-size:18px;font-weight:700;color:${isCancelled?'var(--t3)':'#fbbf24'};font-family:'Rajdhani',sans-serif;${isCancelled?'text-decoration:line-through':''}">${fv(e.quote)}</div>
        <div style="font-size:11px;color:var(--t3)">${isCancelled?'Cancelled':'Quote'}</div>
      </div>
    </div>`;
  }).join('');
}

function switchEvTab(tab, el) {
  document.querySelectorAll('#ev-tabs .tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const evs = S.report?.eventPL || [];
  const now = new Date();
  let f;
  if      (tab==='active')    f = activeEvs(evs);
  else if (tab==='upcoming')  f = activeEvs(evs).filter(e=>new Date(e.date)>=now);
  else if (tab==='balance')   f = activeEvs(evs).filter(e=>(e.balance||0)>0);
  else if (tab==='done')      f = activeEvs(evs).filter(e=>e.status==='Completed');
  else if (tab==='cancelled') f = cancelledEvs(evs);
  else                        f = evs;
  document.getElementById('ev-list').innerHTML = evRows(f);
  const es = document.getElementById('ev-search'); if(es) es.dataset.tab = tab;
}

function filterEvs(q, tab) {
  const evs = S.report?.eventPL || [];
  const filtered = evs.filter(e =>
    e.customer?.toLowerCase().includes(q.toLowerCase()) ||
    e.venue?.toLowerCase().includes(q.toLowerCase()) ||
    e.type?.toLowerCase().includes(q.toLowerCase()) ||
    (e.id||'').toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('ev-list').innerHTML = evRows(filtered);
}

  {name:'Photo Booth',e:'📸'},{name:'Dance Floor',e:'💃'},{name:'Uplights',e:'💡'},

];

// Get full list: built-in + custom saved
function getAllSvcs() {
  const customs = S.customSvcs || [];
  return [...DEFAULT_SVCS, ...customs.map(c => {
    // Handle case where Sheet returns a raw JSON string
    let obj = c;
    if (typeof c === 'string') {
      try { obj = JSON.parse(c); } catch(e) { obj = { name: c }; }
    }
    return {
      name: obj.name || obj,
      e: obj.e || '⭐',
      qty: obj.qty || '',
      size: obj.size || '',
      custom: true,
      permanent: obj.permanent !== false
    };
  })];
}
function svcChip(s, selected) {
  const n = typeof s === 'object' ? s.name : s;
  const e = typeof s === 'object' ? (s.e||'⭐') : '⭐';
  const isCustom = typeof s === 'object' && s.custom;
  const subtitle = typeof s === 'object' && (s.qty || s.size) ? ` <small style="opacity:.7">${[s.size,s.qty?'×'+s.qty:''].filter(Boolean).join(' ')}</small>` : '';
  return `<div class="svc ${selected?'on':''}" data-n="${n}" ${isCustom?'data-custom="1"':''} onclick="toggleSvc(this,'${n.replace(/'/g,"\\'")}')">
    ${e} ${n}${subtitle}
  </div>`;
}

function toggleSvc(el, name) {
  el.classList.toggle('on');
  updateSvcHidden();
}

function updateSvcHidden() {
  const names = [...document.querySelectorAll('#svc-wrap .svc.on')].map(c=>c.dataset.n);

async function addSvc() {
  const name = document.getElementById('as-name').value.trim();
  const size = document.getElementById('as-size').value.trim();
  const qty = document.getElementById('as-qty').value.trim();
  const scope = document.querySelector('input[name="as-scope"]:checked')?.value || 'permanent';
  if (!name) { toast('Enter a name','er'); return; }

  const obj = { name, size, qty: qty ? parseInt(qty) : '', e:'⭐', custom:true, permanent: scope==='permanent' };

  if (scope === 'permanent') {
    const btn = event.target; btn.disabled=true; btn.textContent='Saving…';
    try {
      await apiForce('addCustomEquipmentItem', JSON.stringify(obj)); // store as JSON string
      // Reload custom svcs
      const fresh = await apiForce('getCustomEquipmentList');
      S.customSvcs = fresh || [];
      cDel('getCustomEquipmentList[]');
      toast(`"${name}" saved permanently ✓`, 'ok');
    } catch(e) {
      toast('Saved locally only — Sheet error: ' + e.message, 'in', 5000);
    } finally { btn.disabled=false; }
  } else {
    toast(`"${name}" added for this event`, 'ok');
  }

  // Always add to current form
  S.customSvcs.push(obj);
  closeMo();

  // Rebuild svc grid in form
  const wrap = document.getElementById('svc-wrap');
  if (wrap) {
    const chip = document.createElement('div');
    chip.className = 'svc on';
    chip.dataset.n = name;
    chip.dataset.custom = '1';
    chip.textContent = `⭐ ${name}${size?' '+size:''}${qty?' ×'+qty:''}`;
    chip.onclick = () => { chip.classList.toggle('on'); updateSvcHidden(); };
    wrap.appendChild(chip);
    updateSvcHidden();
  }
}

async function deleteSvc(name) {

    await apiForce('removeCustomEquipmentItem', name);

function selContact(id, name, phone, email) {
  const fc=document.getElementById('f-client'); if(fc) fc.value=name;
  const fp=document.getElementById('f-phone'); if(fp) fp.value=phone;
  const fe=document.getElementById('f-email'); if(fe) fe.value=email;
  const fi=document.getElementById('f-cid'); if(fi) fi.value=id;
  const fs=document.getElementById('csugg'); if(fs) fs.innerHTML='';

async function submitEvent() {
  const client = document.getElementById('f-client')?.value.trim();
  const date = document.getElementById('f-date')?.value;
  if (!client) { toast('Enter client name','er'); return; }
  if (!date) { toast('Enter date','er'); return; }

  const payload = {
    clientName: client, clientPhone: document.getElementById('f-phone').value,
    clientEmail: document.getElementById('f-email').value,
    contactId: document.getElementById('f-cid').value,
    eventDate: date, startTime: document.getElementById('f-stime').value,
    endTime: document.getElementById('f-etime').value,
    eventType: document.getElementById('f-type').value,
    venue: document.getElementById('f-venue').value,
    address: document.getElementById('f-venue').value,
    equipment: document.getElementById('f-equip').value,
    team: document.getElementById('f-team').value,
    quote: parseFloat(document.getElementById('f-quote').value)||0,
    notes: document.getElementById('f-notes').value,
  };

  const dep = parseFloat(document.getElementById('f-dep').value)||0;
  const btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';

  // ── OPTIMISTIC: navigate immediately, save in background ──
  const toastId = toast('📋 Saving to Google Sheets…', 'in', 30000);
  cDel('getReportData["' + S.year + '"]'); S.report = null;
  go('events'); // ← navigate instantly, no waiting

  // Save fires in background — user is already on Events page
  apiForce('createEvent', payload)
    .then(result => {
      // Log deposit in background too if provided
      if (dep > 0 && result.eventId) {
        apiForce('recordTransaction', {
          eventId: result.eventId, date, direction:'income', subtype:'deposit',
          person: client, amount: dep, method:'Cash', account:'Kirtan', notes:'Deposit at booking'
        }).catch(()=>{});
      }
      toast(`✅ ${client} saved! ID: ${result.eventId}${result.calId?' 📅':''}`, 'ok', 5000);
      // Refresh events list silently
      apiForce('getReportData', S.year).then(d=>{ if(d){ S.report=d; if(S.view==='events') renderEvsHTML(d.eventPL||[]); }}).catch(()=>{});
    })
    .catch(e => {
      toast(`❌ Save failed: ${e.message} — check Sheet`, 'er', 8000);
    });
}

function evPLRows(evs) {
  return evs.map(e=>`<tr onclick="openEvDetail('${e.id}')">

    <td class="${(e.balance||0)>0?'aout':'ain'}">${fv(e.balance)}</td>
    <td>${pill(e.status)}</td>
  </tr>`).join('');
}

function filterEvPL(s) {
  const evs = activeEvs(S.report?.eventPL||[]);
  const f = s ? evs.filter(e=>e.status===s) : evs;
  document.getElementById('evpl-body').innerHTML = evPLRows(f);

function toggleCancelledInFin(btn) {
  const sec = document.getElementById('cancelled-pl-section');

  btn.textContent = showing ? `Show ${cancelledEvs(S.report?.eventPL||[]).length} Cancelled` : 'Hide Cancelled';

function switchToTab(tab) {
  go('events');

  setTimeout(()=>{

function exportCSV() {
  const evs = S.report?.eventPL||[];
  const rows = [['ID','Client','Date','Type','Quote','Paid','Balance','Status'],
    ...evs.map(e=>[e.id,e.customer,e.date,e.type,e.quote,e.income,e.balance,e.status])];
  const a=document.createElement('a');
  a.href='data:text/csv,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download=`ck-${S.year}.csv`; a.click();
}

function buildCal(today) {
  const fd=new Date(today.getFullYear(),today.getMonth(),1).getDay();
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  let h='';
  for(let i=0;i<fd;i++) h+=`<div class="cal-c" style="background:transparent;border-color:transparent"></div>`;
  const evDs=(S.report?.eventPL||[]).filter(e=>e.status!=='Cancelled').map(e=>({dy:new Date(e.date).getDate(),mo:new Date(e.date).getMonth(),type:e.type}));
  for(let d=1;d<=dim;d++){
    const isT=d===today.getDate()&&today.getMonth()===today.getMonth();
    const des=evDs.filter(e=>e.dy===d&&e.mo===today.getMonth());
    h+=`<div class="cal-c ${isT?'td':''}"><div class="cdn">${d}</div>${des.map(e=>`<div class="cev">${(e.type||'').substring(0,3)}</div>`).join('')}</div>`;
  }
  return h;
}

function filterInv(q) {

async function cancelEvent(id) {
  const reason = document.getElementById('cancel-reason')?.value || '';
  const btn = document.getElementById('cancel-btn');

  try {
    await apiForce('updateEvent', id, {
      status: 'Cancelled',
      notes: reason ? `[CANCELLED: ${reason}]` : '[CANCELLED]'
    });
    // Update local cache so UI reflects immediately without waiting for API
    if (S.report?.eventPL) {
      const ev = S.report.eventPL.find(e=>e.id===id);
      if (ev) ev.status = 'Cancelled';
    }
    cDel('getReportData["' + S.year + '"]');
    toast('Event marked cancelled ✓ — excluded from all calculations', 'ok', 4000);
    closeMo();

  } catch(e) {
    toast('Failed: ' + e.message, 'er');
    btn.disabled=false; btn.textContent='✕ Yes, Mark Cancelled';
  }
}

  if (!confirm('Restore this event? It will appear in all calculations again.')) return;
  try {
    await apiForce('updateEvent', id, { status: 'Booked' });

      const ev = S.report.eventPL.find(e=>e.id===id);
      if (ev) ev.status = 'Booked';

    closeMo();
    if (S.report?.eventPL) renderEvsHTML(S.report.eventPL);

}

  document.querySelector('#mo-ov .mo-ttl').textContent = 'Log Payment';
  const box = document.getElementById('lp-evid')?.closest('.mo');
  if (box) {
    const inp = document.createElement('div');
    inp.className='fg'; inp.style.marginBottom='0';
    inp.innerHTML=`<label class="fl">Event ID (optional)</label><input class="fi" id="lp-evid" placeholder="CKE2026…"/>`;
    box.insertBefore(inp, box.querySelector('.fgrid'));
  }
}

async function savePay() {
  const amt=parseFloat(document.getElementById('lp-amt')?.value)||0;
  if(!amt){toast('Enter amount','er');return;}
  const evid=document.getElementById('lp-evid')?.value||'';
  const payload={
    eventId:evid||'GENERAL',date:document.getElementById('lp-date').value,
    direction:document.getElementById('lp-dir').value,
    subtype:document.getElementById('lp-sub').value,
    person:document.getElementById('lp-person').value,
    amount:amt,method:document.getElementById('lp-meth').value,
    account:document.getElementById('lp-acct').value,
  };
  const btn=document.getElementById('lp-btn'); btn.disabled=true; btn.textContent='Saving…';
  try {
    const action=evid?'recordTransaction':'recordGeneralTransaction';
    const res=await apiForce(action,payload);
    cDel('getReportData["'+S.year+'"]'); S.report=null;
    toast(`Saved! TX: ${res.txId||res.id||'✓'}`,'ok',4000);
    closeMo();
  }catch(e){toast('Failed: '+e.message,'er');btn.disabled=false;btn.textContent='Save to Google Sheets';}
}

/* ═══ GLOBAL SEARCH ══════════════════════════════════════════ */
let _gTO=null;
async function doGSearch(q) {
  clearTimeout(_gTO);
  if (!q||q.length<2) return;
  _gTO=setTimeout(async()=>{
    try {
      const res=await api('searchEvents',q);
      if(res?.length) toast(`Found ${res.length} event(s) for "${q}"`, 'in', 2000);
    }catch(e){}
  },500);
}

/* ═══ BOOT ═══════════════════════════════════════════════════ */
async function init() {
  await loadConfig();   // ← load URL from config.json first
  const hash = window.location.hash.replace('#','') || 'dashboard';
  go(hash);

  window.addEventListener('hashchange', () => {
    const h=window.location.hash.replace('#','');
    if (h && h!==S.view) go(h);
  });

  // Background connection test (non-blocking)
  testConn(true).then(ok=>{
    if (!ok) setTimeout(()=>toast('⚠️ Not connected — check Settings','in',5000),1000);
  });

  // Preload all data in parallel (background, non-blocking)
  // This way 2nd visit is instant
  setTimeout(() => {
    Promise.allSettled([
      apiForce('getReportData', S.year).then(d=>{S.report=d;}),
      apiForce('getContacts').then(d=>{if(d)S.contacts=d;}),
      apiForce('getEquipmentList').then(d=>{if(d)S.equipment=d;}),
      apiForce('getCustomEquipmentList').then(d=>{if(d)S.customSvcs=d;}),
      apiForce('getUpcomingCalendarEvents').then(d=>{if(d)S.calEvents=d;}),
      apiForce('getMileageList', parseInt(S.year)||new Date().getFullYear()).then(d=>{if(d)S.mileageData=d;}),
    ]).then(() => {
      // Re-render if still on dashboard to show loaded data
      if (S.view === 'dashboard') renderDashHTML();
    });
  }, 800); // small delay so UI renders first
}

init();
